<div id="cadastro">

<img id="imagen2" src="imagens/logo cadastro.png" alt="login" width="300px" height="300px">

<form id="formcadastro" onsubmit="cadastrar(event)">

<label class="letra">Nome:</label>

<input
    type="text"
    id="nome"
    name="nome"
    class="estilizacao"
    maxlength="50"
    required
>

<br><br>

<label class="letra">Email:</label>

<input
    type="email"
    id="email"
    name="email"
    class="estilizacao"
    maxlength="50"
    required
>

<br><br>

<label class="letra">Telefone:</label>

<input
    type="tel"
    id="telefone"
    name="telefone"
    class="estilizacao"
    maxlength="11"
    placeholder="(00) 00000-0000"
    required
>


<br><br>

<button
    type="submit"
    id="botaocadastro"
>
    Cadastre-se
</button>

</form>
